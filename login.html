<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">

    <title>Login - Panes Hermanos</title>
    <meta content="" name="description">
    <meta content="" name="keywords">

    <link href="assets/img/ph.png" rel="icon">
    <link href="assets/img/ph.png" rel="apple-touch-icon">

    <link href="https://fonts.gstatic.com" rel="preconnect">
    <link
        href="https://fonts.googleapis.com/css?family=Open+Sans:300,300i,400,400i,600,600i,700,700i|Nunito:300,300i,400,400i,600,600i,700,700i|Poppins:300,300i,400,400i,500,500i,600,600i,700,700i"
        rel="stylesheet">

    <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>

<body>

    <main>
        <div class="container">
            <section
                class="section register min-vh-100 d-flex flex-column align-items-center justify-content-center py-4">
                <div class="container">
                    <div class="row justify-content-center">
                        <div class="col-lg-4 col-md-6 d-flex flex-column align-items-center justify-content-center">

                            <div class="d-flex justify-content-center py-4 mb-2">
                                <a href="login.html" class="logo d-flex align-items-center w-auto">
                                    <img src="assets/img/ph.png" alt="Logo Panes Hermanos"
                                        style="max-height: 150px; width: auto;">
                                </a>
                            </div>

                            <div class="card mb-3 w-100">
                                <div class="card-body">

                                    <div class="pt-4 pb-2">
                                        <h5 class="card-title text-center pb-0 fs-4">Ingreso al Punto de Venta</h5>
                                        <p class="text-center small text-muted">Introduce tu usuario y contraseña</p>
                                    </div>

                                    <form class="row g-3" id="form-login">

                                        <div class="col-12">
                                            <label for="username" class="form-label fw-bold">Usuario</label>
                                            <div class="input-group">
                                                <span class="input-group-text"><i class="bi bi-person"></i></span>
                                                <input type="text" name="username" class="form-control" id="username"
                                                    required>
                                            </div>
                                        </div>

                                        <div class="col-12">
                                            <label for="password" class="form-label fw-bold">Contraseña</label>
                                            <div class="input-group">
                                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                                <input type="password" name="password" class="form-control"
                                                    id="password" required>
                                            </div>
                                        </div>

                                        <div class="col-12 mt-4">
                                            <button class="btn btn-primary w-100" type="submit"
                                                style="background-color: #4154f1; border-color: #4154f1;">
                                                <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar Sesión
                                            </button>
                                        </div>

                                    </form>

                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>

    <script>
        document.getElementById('form-login').addEventListener('submit', function (e) {
            e.preventDefault();

            const usuario = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            // Simulador de validación básica
            if (usuario && pass) {
                // Guardamos el nombre en LocalStorage para usarlo en el header de index.html
                localStorage.setItem('ph_usuario_activo', usuario);
                // Redirigir al panel principal
                window.location.href = 'index.html';
            }
        });
    </script>

</body>

</html>
